version: '3.8'

services:
  canopy:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    container_name: canopy-node
    restart: unless-stopped
    ports:
      - "8080:8080"   # REST API
      - "9090:9090"   # P2P
      - "50051:50051" # gRPC
    volumes:
      - canopy-data:/root/.canopy
    environment:
      - CANOPY_ENV=production
      - CANOPY_LOG_LEVEL=debug  # changed from info to debug for local learning/inspection
    networks:
      - canopy-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"  # keep logs from eating disk space on my dev machine
        max-file: "5"    # bumped from 3 to 5 to retain a bit more log history for debugging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # bumped further; my machine is particularly slow on cold starts

  canopy-auto-update:
    build:
      context: .
      dockerfile: .docker/auto-update/Dockerfile
    container_name: canopy-auto-update
    restart: unless-stopped
    depends_on:
      - canopy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - canopy-data:/root/.canopy
    environment:
      - UPDATE_INTERVAL=86400  # check once a day; I update manually most of the time
      - CANOPY_CONTAINER=canopy-node
    networks:
      - canopy-net

volumes:
  canopy-data:
    driver: local

networks:
  canopy-net:
    driver: bridge
