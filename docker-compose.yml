version: '3.8'

services:
  canopy:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    container_name: canopy-node
    restart: unless-stopped
    ports:
      - "8080:8080"   # REST API
      - "9090:9090"   # P2P
      - "50051:50051" # gRPC
    volumes:
      - canopy-data:/root/.canopy
    environment:
      - CANOPY_ENV=production
      - CANOPY_LOG_LEVEL=info
    networks:
      - canopy-net

  canopy-auto-update:
    build:
      context: .
      dockerfile: .docker/auto-update/Dockerfile
    container_name: canopy-auto-update
    restart: unless-stopped
    depends_on:
      - canopy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - canopy-data:/root/.canopy
    environment:
      - UPDATE_INTERVAL=7200  # check every 2 hours instead of 1
      - CANOPY_CONTAINER=canopy-node
    networks:
      - canopy-net

volumes:
  canopy-data:
    driver: local

networks:
  canopy-net:
    driver: bridge
